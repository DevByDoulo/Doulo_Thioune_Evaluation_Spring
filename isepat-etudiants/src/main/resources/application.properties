spring.application.name=isepat-etudiants
spring.profiles.active=dev

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Cle de signature JWT (HS256, min. 32 caracteres) et duree de validite du token (ms, ici 24h)
jwt.secret=${JWT_SECRET:isepat-etudiants-cle-secrete-jwt-a-changer-en-production-32c}
jwt.expiration=${JWT_EXPIRATION:86400000}
